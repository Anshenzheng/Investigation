server:
  port: 8080

spring:
  application:
    name: wenji-survey
  
  datasource:
    url: jdbc:mysql://localhost:3306/wenji_survey?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: wenjiSurveySecretKey2024VeryLongSecretKeyForJWTToken
  expiration: 86400000

logging:
  level:
    com.wenji.survey: DEBUG
    org.springframework.web: INFO
